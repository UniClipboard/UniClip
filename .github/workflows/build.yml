name: build

permissions:
  contents: write

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_number:
        description: "iOS: override CFBundleVersion (empty = use app.json expo.ios.buildNumber)"
        required: false
        type: string
      upload_testflight:
        description: "iOS: also upload the dev build to TestFlight (no Android/Gitee release)"
        required: false
        default: false
        type: boolean

jobs:
  # ---- Always (every push) ----
  code-style:
    uses: ./.github/workflows/code-style.yml

  android-build:
    uses: ./.github/workflows/android-build.yml

  unit-tests:
    uses: ./.github/workflows/test.yml

  # ---- iOS build: expensive (archive) + needs signing secrets, so only on a
  #      v* tag or a manual dispatch, never on ordinary branch pushes. ----
  ios-build:
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/build-ios.yml
    secrets: inherit
    with:
      build_number: ${{ inputs.build_number }}
      upload_testflight: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_testflight || false }}

  # ---- Release: TestFlight (iOS) + GitHub/Gitee Release (Android). Gated on a
  #      v* tag and on both builds + checks succeeding. ----
  release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [code-style, unit-tests, android-build, ios-build]
    uses: ./.github/workflows/release.yml
    secrets: inherit
