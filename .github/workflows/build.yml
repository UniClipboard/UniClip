name: build

permissions:
  contents: write

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

jobs:
  code-style:
    uses: ./.github/workflows/code-style.yml

  android-build:
    uses: ./.github/workflows/android-build.yml

  unit-tests:
    uses: ./.github/workflows/test.yml

  publish-release:
    name: Publish GitHub Release
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [code-style, android-build, unit-tests]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract changelog from CHANGES.md
        run: |
          awk 'NR==1{next} /^$/{exit} {print}' CHANGES.md > feature.txt
          cat feature.txt

      - name: Download APK artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: apk-*
          path: apk/
          merge-multiple: true

      - name: Publish Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          bodyFile: feature.txt
          artifacts: apk/*.apk

  sync-to-gitee:
    name: Sync to Gitee
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [publish-release]
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH for Gitee
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GITEE_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts

      - name: Bare clone from GitHub
        run: |
          git clone --bare https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git bare-repo

      - name: Mirror push to Gitee
        run: |
          cd bare-repo
          git push git@gitee.com:${{ vars.GITEE_OWNER }}/${{ vars.GITEE_REPO }}.git \
            '+refs/heads/*:refs/heads/*' \
            '+refs/tags/*:refs/tags/*' \
            --prune

  publish-gitee-release:
    name: Publish Gitee Release
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [sync-to-gitee]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract changelog from CHANGES.md
        run: |
          awk 'NR==1{next} /^$/{exit} {print}' CHANGES.md > feature.txt

      - name: Download APK artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: apk-*
          path: apk/
          merge-multiple: true

      - name: Create Gitee Release
        id: create_release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
          GITEE_OWNER: ${{ vars.GITEE_OWNER }}
          GITEE_REPO: ${{ vars.GITEE_REPO }}
          TAG_NAME: ${{ github.ref_name }}
          IS_PRERELEASE: ${{ contains(github.ref_name, 'beta') }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess
          data = {
              "access_token": os.environ["GITEE_TOKEN"],
              "tag_name": os.environ["TAG_NAME"],
              "name": os.environ["TAG_NAME"],
              "body": open("feature.txt").read(),
              "prerelease": os.environ["IS_PRERELEASE"] == "true",
              "target_commitish": "main"
          }
          with open("release.json", "w") as f:
              json.dump(data, f)
          PYEOF

          RESPONSE=$(curl -s -X POST \
            "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases" \
            -H "Content-Type: application/json" \
            -d @release.json)
          echo "Gitee API response: $RESPONSE"

          RELEASE_ID=$(echo "$RESPONSE" | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT

      - name: Upload APKs to Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
          GITEE_OWNER: ${{ vars.GITEE_OWNER }}
          GITEE_REPO: ${{ vars.GITEE_REPO }}
        run: |
          for APK in apk/*.apk; do
            echo "Uploading $APK..."
            curl -s -X POST \
              "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/${{ steps.create_release.outputs.release_id }}/attach_files" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@${APK}"
            echo ""
          done
